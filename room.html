<!DOCTYPE html>
<html>
  <head>
    <title>Escape Room</title>
    <link rel="stylesheet" href="css/style.css">
    <script type="text/javascript" src="js/game.js"></script>
  </head>
  <body id="page">
    <audio id="bgMusic" autoplay loop>
      <source src="audio/music.mp3">
      Your browser does not support the audio element.
    </audio>
    <div style="display: flex; height: 50px; justify-content: space-evenly; align-items: center;" class="topbar">
        <a href="home.html">Restart Game</a>
        <p class="topText">Time Left: <span id="counter">30:00</span></p>
        <p class="topText">Audio
          <button id="muteBtn" onclick="toggleMute()">🔊</button>
        </p>
    </div>

    <div id="room">
      <button style="font-size: 30px;" id="leftButton" onclick="changeBackground(1)">⇦</button>
      <button style="font-size: 30px;" id="rightButton" onclick="changeBackground(-1)">⇨</button>
      
      <div class="clickable" id="safeSpot" onclick="openObject('images/safe.jpeg')"></div>
      <div class="clickable" id="folderSpot" onclick="openObject('images/folder.PNG')"></div>
      <div class="clickable" id="codeSpot" onclick="openObject('images/code.PNG')"></div>

      <div id="objectView" class="overlay hidden">
        <img id="objectImage">
        <button onclick="closeObject()">X</button>
          <div id="keys">
            <button class="key" data-num="1" style="left:33%; top:34.5%" onclick="press(this)"></button>
            <button class="key" data-num="2" style="left:37%; top:34.5%" onclick="press(this)"></button>
            <button class="key" data-num="3" style="left:41%; top:34.5%" onclick="press(this)"></button>
            <button class="key" data-num="4" style="left:45%; top:34.5%" onclick="press(this)"></button>

            <button class="key" data-num="5" style="left:33%; top:45%" onclick="press(this)"></button>
            <button class="key" data-num="6" style="left:37%; top:45%" onclick="press(this)"></button>
            <button class="key" data-num="7" style="left:41%; top:45%" onclick="press(this)"></button>
            <button class="key" data-num="8" style="left:45%; top:45%" onclick="press(this)"></button>

            <button class="key" data-num="9" style="left:37%; top:55%" onclick="press(this)"></button>
            <button class="key" data-num="0" style="left:41%; top:55%" onclick="press(this)"></button>
            <button class="key" style="left:45%; top:55%" onclick="checkCode()"></button>
          </div>
          <div id="keypad">
            <h3>Code:</h3>
            <div id="typed">----</div>
          </div>

          <div id="textOverlay" class="hidden">
            <input type="text" maxlength="3" id="codeInput">
            <button style="right: 10%" onclick="checkTextCode()">Check</button>
          </div>
      </div>
    </div>

  </body>
</html>
