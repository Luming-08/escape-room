<!DOCTYPE html>
<html>
  <head>
    <title>Escape Room</title>
    <link rel="stylesheet" href="css/style.css">
    <script type="text/javascript" src="js/game.js"></script>
  </head>
  <body>
    <audio autoplay>
        <source src="audio/yippee.mp3">
    </audio>

    <div style="display: flex; height: 550px; flex-direction: column; justify-content: center; align-items: center;">
        <h1 class="fadeInUp-animation" style="margin: 0;">Congrats!</h1>
        <p class="fadeInUp-animation" style="margin: 0; font-size: 50px;">
            You escaped with <span id="timeLeftDisplay"></span> remaining!
        </p>
        <a href="index.html">
            <button class="fadeInUp-animation" style="font-size: 16px;">Play again</button>
        </a>
    </div>
    
    <script>
        const timeLeft = Number(localStorage.getItem("timeLeft"));

        const minutes = Math.floor(timeLeft / 60);
        const seconds = timeLeft % 60;

        document.getElementById("timeLeftDisplay").innerText =
            `${minutes}:${seconds.toString().padStart(2, "0")}`;
    </script>
  </body>
</html>
